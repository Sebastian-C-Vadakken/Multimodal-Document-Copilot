<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot | AI Document Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg-gradient-start: #f3f4f6;
            --bg-gradient-end: #e5e7eb;
            --chat-bg: #ffffff;
            --user-msg-bg: #4F46E5;
            --user-msg-text: #ffffff;
            --ai-msg-bg: #f3f4f6;
            --ai-msg-text: #1f2937;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1f2937;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        /* Upload Section */
        .upload-area {
            padding: 15px 30px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload {
            background: white;
            border: 1px solid var(--border-color);
            color: #374151;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-upload:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        .status-badge {
            font-size: 0.875rem;
            padding: 4px 12px;
            border-radius: 9999px;
            background: #e0e7ff;
            color: #4338ca;
            display: none;
            /* Hidden by default */
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            display: inline-flex;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--chat-bg);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .message.user .bubble {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: var(--ai-msg-bg);
            color: var(--ai-msg-text);
            border-bottom-left-radius: 4px;
        }

        .meta {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 5px;
        }

        .citation {
            font-size: 0.8rem;
            color: #6b7280;
            background: #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            display: inline-block;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--ai-msg-bg);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            display: none;
            /* Hidden by default */
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            margin: auto;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
                Copilot
            </div>
            <div id="doc-status" class="status-badge">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" style="width:14px;height:14px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
                PDF Indexed
            </div>
        </header>

        <div class="upload-area">
            <div class="file-input-wrapper">
                <button class="btn-upload">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" style="width:18px;height:18px;">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                    Choose PDF
                </button>
                <input type="file" id="pdfFile" accept="application/pdf" onchange="handleFileSelect(this)">
            </div>
            <span id="file-name" style="font-size: 0.9rem; color: #6b7280;">No file selected</span>
            <button id="upload-btn" class="btn-primary" onclick="uploadPDF()" disabled style="margin-left: auto;">Upload
                & Process</button>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="empty-state" id="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                </svg>
                <p>Upload a document to start chatting</p>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Ask a question about your document..."
                onkeypress="handleKeyPress(event)" disabled>
            <button class="btn-primary" id="send-btn" onclick="askQuestion()" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" style="width:20px;height:20px;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000";
        let currentDocId = null;

        function handleFileSelect(input) {
            const fileName = input.files[0] ? input.files[0].name : "No file selected";
            document.getElementById("file-name").innerText = fileName;
            document.getElementById("upload-btn").disabled = !input.files[0];
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                askQuestion();
            }
        }

        function addMessage(text, sender) {
            const chatArea = document.getElementById("chat-area");
            const emptyState = document.getElementById("empty-state");
            const typingIndicator = document.getElementById("typing-indicator");

            if (emptyState) emptyState.style.display = 'none';

            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerText = text;

            msgDiv.appendChild(bubble);

            // Insert before typing indicator
            chatArea.insertBefore(msgDiv, typingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping(show) {
            const indicator = document.getElementById("typing-indicator");
            const chatArea = document.getElementById("chat-area");
            indicator.style.display = show ? 'flex' : 'none';
            if (show) chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function uploadPDF() {
            const fileInput = document.getElementById("pdfFile");
            const file = fileInput.files[0];
            const uploadBtn = document.getElementById("upload-btn");

            if (!file) return;

            uploadBtn.disabled = true;
            uploadBtn.innerText = "Uploading...";

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch(BASE_URL + "/upload_pdf", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) throw new Error("Upload failed");

                const data = await res.json();
                currentDocId = data.doc_id;

                document.getElementById("doc-status").classList.add("active");
                document.getElementById("question").disabled = false;
                document.getElementById("send-btn").disabled = false;
                document.getElementById("question").focus();

                addMessage(`Document uploaded successfully! Indexed ${data.chunks_indexed} chunks. You can now ask questions.`, "ai");

            } catch (err) {
                alert("Error uploading file: " + err.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Upload & Process";
            }
        }

        async function askQuestion() {
            const questionInput = document.getElementById("question");
            const question = questionInput.value.trim();

            if (!question || !currentDocId) return;

            addMessage(question, "user");
            questionInput.value = "";
            showTyping(true);

            try {
                const res = await fetch(BASE_URL + "/ask_question", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        doc_id: currentDocId,
                        question: question,
                        top_k: 5
                    })
                });

                const data = await res.json();
                showTyping(false);

                if (res.ok) {
                    addMessage(data.answer, "ai");
                } else {
                    addMessage("Error: " + (data.detail || "Failed to get answer"), "ai");
                }

            } catch (err) {
                showTyping(false);
                addMessage("Network error: " + err.message, "ai");
            }
        }
    </script>
</body>

</html>
